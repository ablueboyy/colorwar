<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorWar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='8' height='16' fill='%233b82f6'/><rect x='8' width='8' height='16' fill='%23ef4444'/></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060d1a;
      color: #e2e8f0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 16px 32px;
    }

    /* ── Title ── */
    .site-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: 14px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #60a5fa 0%, #c084fc 50%, #f87171 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      padding-top: 4px;
    }
    .tagline {
      font-size: 0.62rem;
      letter-spacing: 6px;
      color: #334155;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── Lobby ── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
    }

    /* Loadout picker */
    #loadout {
      background: #0b1526;
      border: 1px solid #1e3655;
      border-radius: 8px;
      padding: 14px 16px;
      width: 560px;
      max-width: 92vw;
    }
    .loadout-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.72rem;
      letter-spacing: 3px;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #loadout-count { color: #facc15; font-weight: bold; letter-spacing: 1px; }
    #loadout-count.full { color: #4ade80; }
    #loadout-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .lo-btn {
      background: #060d1a;
      border: 1px solid #1e3655;
      border-radius: 5px;
      color: #e2e8f0;
      cursor: pointer;
      font-family: inherit;
      padding: 7px 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: border-color 0.1s, background 0.1s, opacity 0.1s;
    }
    .lo-btn:hover { border-color: #3b82f6; }
    .lo-btn.picked {
      border-color: #facc15;
      background: #15120a;
      box-shadow: 0 0 8px rgba(250,204,21,0.25);
    }
    .lo-btn.locked { opacity: 0.4; }
    .lo-glyph { font-size: 0.95rem; font-weight: bold; color: #60a5fa; line-height: 1; }
    .lo-btn.picked .lo-glyph { color: #facc15; }
    .lo-label { font-size: 0.62rem; color: #94a3b8; white-space: nowrap; }
    .lo-cost { font-size: 0.58rem; color: #fbbf24; font-weight: bold; }
    .loadout-hint { font-size: 0.62rem; color: #334155; margin-top: 10px; letter-spacing: 1px; text-align: center; }

    /* Loadout detail panel (tap-to-preview, touch friendly) */
    #loadout-detail {
      margin-top: 12px;
      background: #060d1a;
      border: 1px solid #1e3655;
      border-radius: 6px;
      padding: 11px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ld-header { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .ld-glyph { font-size: 1.3rem; font-weight: bold; color: #60a5fa; width: 24px; text-align: center; }
    .ld-name { font-size: 1rem; font-weight: bold; color: #f1f5f9; }
    .ld-role {
      font-size: 0.58rem; background: #facc15; color: #060d1a;
      border-radius: 3px; padding: 2px 6px; font-weight: bold; letter-spacing: 1px;
    }
    .ld-status { font-size: 0.58rem; border-radius: 3px; padding: 2px 7px; font-weight: bold; }
    .ld-status.in  { background: #15803d; color: #dcfce7; }
    .ld-status.out { background: #1e293b; color: #64748b; }
    .ld-cost { margin-left: auto; color: #fbbf24; font-weight: bold; font-size: 0.9rem; }
    .ld-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 20px; }
    .ld-stat { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; }
    .ld-stat .lab  { color: #475569; width: 30px; flex-shrink: 0; }
    .ld-stat .val  { color: #cbd5e1; width: 62px; flex-shrink: 0; }
    .ld-stat .bars { color: #3b82f6; letter-spacing: 2px; }
    .ld-stat .bars .empty { color: #1e3655; }
    .ld-desc { font-size: 0.74rem; color: #94a3b8; line-height: 1.5; }

    @media (max-width: 600px) {
      .ld-stats { grid-template-columns: 1fr; }
    }

    .lobby-actions {
      display: flex;
      gap: 0;
      align-items: stretch;
    }

    .lobby-card {
      background: #0b1526;
      border: 1px solid #1e3655;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 210px;
    }
    .lobby-card:first-child { border-radius: 8px 0 0 8px; }
    .lobby-card:last-child  { border-radius: 0 8px 8px 0; border-left-color: transparent; }

    .lobby-card-title {
      font-size: 0.62rem;
      letter-spacing: 4px;
      color: #475569;
      text-transform: uppercase;
    }

    .lobby-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1526;
      border-top: 1px solid #1e3655;
      border-bottom: 1px solid #1e3655;
      padding: 0 12px;
      color: #1e3655;
      font-size: 0.65rem;
      letter-spacing: 1px;
    }

    .lobby-card input {
      background: #060d1a;
      border: 1px solid #1e3655;
      border-radius: 4px;
      color: #f1f5f9;
      font-family: inherit;
      font-size: 1.5rem;
      padding: 8px 12px;
      text-align: center;
      text-transform: uppercase;
      width: 148px;
      letter-spacing: 10px;
      transition: border-color 0.15s;
    }
    .lobby-card input:focus   { outline: none; border-color: #3b82f6; }
    .lobby-card input::placeholder { color: #1e3655; letter-spacing: 6px; }

    .lobby-solo   { margin-top: 16px; text-align: center; }
    .lobby-solo .btn { min-width: 260px; }
    #difficulty   { display: inline-flex; gap: 0; margin-bottom: 10px; border-radius: 6px; overflow: hidden; border: 1px solid #1e3655; }
    .diff-btn {
      background: #0b1526; color: #64748b; border: none; cursor: pointer;
      padding: 6px 18px; font-size: 0.75rem; letter-spacing: 2px; font-family: inherit;
    }
    .diff-btn + .diff-btn { border-left: 1px solid #1e3655; }
    .diff-btn:hover { color: #cbd5e1; }
    .diff-btn.selected { background: #1d4ed8; color: #fff; font-weight: bold; }

    /* Tower sprite icons (replace old letter glyphs) render crisp + centered */
    img.lo-glyph, img.ld-glyph, img.tw-glyph, img.ti-glyph {
      image-rendering: pixelated;
      vertical-align: middle;
      flex-shrink: 0;
    }

    #lobby-error  { color: #f87171; font-size: 0.8rem; min-height: 1.2em; text-align: center; }
    #conn-status  { font-size: 0.72rem; min-height: 1.1em; letter-spacing: 1px; text-align: center; }
    #conn-status.connecting { color: #fbbf24; }
    #conn-status.open       { color: #4ade80; }
    #conn-status.closed     { color: #f87171; }

    /* ── Waiting ── */
    #waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
    }

    .waiting-label {
      font-size: 0.62rem;
      letter-spacing: 5px;
      color: #334155;
      text-transform: uppercase;
    }

    #room-code-display {
      font-size: 4.5rem;
      font-weight: bold;
      letter-spacing: 22px;
      color: #facc15;
      text-shadow: 0 0 40px rgba(250, 204, 21, 0.35);
      padding-left: 22px; /* compensate letter-spacing on last char */
    }

    .waiting-hint {
      font-size: 0.72rem;
      color: #334155;
      letter-spacing: 2px;
    }

    #wait-status {
      color: #475569;
      font-size: 0.78rem;
      letter-spacing: 2px;
    }
    #wait-status::after {
      content: '';
      animation: dots 1.6s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* ── Game ── */
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
    }

    /* In-game network banner (own reconnect / opponent dropped) */
    #net-banner {
      width: 720px;
      max-width: 96vw;
      box-sizing: border-box;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-align: center;
      font-weight: bold;
      background: #422006;
      color: #fbbf24;
      border: 1px solid #a16207;
    }

    #mute-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 5;
      width: 34px;
      height: 34px;
      padding: 0;
      font-size: 1rem;
      line-height: 34px;
      text-align: center;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      opacity: 0.75;
      transition: opacity 0.15s;
    }
    #mute-btn:hover { opacity: 1; }
    #mute-btn.muted { opacity: 0.5; }

    /* HUD */
    #hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      width: 720px;
      gap: 8px;
    }

    .player-card {
      background: #0b1526;
      border: 1px solid #1e3655;
      border-radius: 6px;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .player-card.p1 { border-left: 3px solid #3b82f6; }
    .player-card.p2 { border-right: 3px solid #ef4444; text-align: right; }

    .pc-name  { font-size: 0.58rem; letter-spacing: 3px; color: #334155; text-transform: uppercase; }
    .pc-money { font-size: 1.25rem; font-weight: bold; line-height: 1.2; }
    .pc-cells { font-size: 0.72rem; opacity: 0.65; }
    .player-card.p1 .pc-money { color: #93c5fd; }
    .player-card.p2 .pc-money { color: #fca5a5; }
    .player-card.p1 .pc-cells { color: #93c5fd; }
    .player-card.p2 .pc-cells { color: #fca5a5; }

    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: #0b1526;
      border: 1px solid #1e3655;
      border-radius: 6px;
      padding: 6px 20px;
      min-width: 110px;
    }
    .timer-label { font-size: 0.52rem; letter-spacing: 3px; color: #334155; text-transform: uppercase; }
    #timer {
      font-size: 2rem;
      font-weight: bold;
      color: #f1f5f9;
      letter-spacing: 2px;
      line-height: 1;
    }
    #timer.warning {
      color: #ef4444;
      animation: timerPulse 0.7s ease-in-out infinite;
    }
    @keyframes timerPulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 12px rgba(239,68,68,0.6); }
      50%       { opacity: 0.55; text-shadow: none; }
    }

    /* Territory bar */
    #territory-bar {
      width: 720px;
      height: 6px;
      display: flex;
      border-radius: 3px;
      overflow: hidden;
      background: #1e3655;
    }
    .terr-seg { transition: width 0.4s ease; height: 100%; }
    #terr-p1      { background: #3b82f6; }
    #terr-neutral { background: #1e3655; }
    #terr-p2      { background: #ef4444; }

    /* Canvas */
    #canvas-wrap { position: relative; line-height: 0; }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #1e3655;
    }

    /* Floating upgrade / sell menu on the selected tower */
    #tower-actions {
      position: absolute;
      display: flex;
      gap: 4px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
    }
    .act-btn {
      pointer-events: auto;
      font-family: inherit;
      font-size: 0.66rem;
      font-weight: bold;
      letter-spacing: 0.5px;
      padding: 4px 9px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1.2;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      transition: filter 0.1s, opacity 0.1s;
    }
    .act-btn:hover:not(:disabled) { filter: brightness(1.25); }
    .act-upgrade {
      background: #15803d;
      border: 1px solid #4ade80;
      color: #dcfce7;
    }
    .act-upgrade:disabled { opacity: 0.4; cursor: not-allowed; }
    .act-sell {
      background: #991b1b;
      border: 1px solid #f87171;
      color: #fee2e2;
    }

    /* Tower panel */
    #tower-panel {
      display: flex;
      gap: 5px;
      padding: 8px;
      background: #0b1526;
      border: 1px solid #1e3655;
      border-radius: 8px;
      width: 720px;
    }

    .tower-btn {
      background: #060d1a;
      border: 1px solid #1e3655;
      border-radius: 5px;
      color: #e2e8f0;
      cursor: pointer;
      font-family: inherit;
      padding: 7px 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      transition: border-color 0.1s, background 0.1s, box-shadow 0.1s;
    }
    .tower-btn:hover:not(:disabled) {
      border-color: #3b82f6;
      background: #0b1526;
      box-shadow: 0 0 10px rgba(59,130,246,0.25);
    }
    .tower-btn.selected {
      border-color: #facc15;
      background: #15120a;
      box-shadow: 0 0 10px rgba(250,204,21,0.3);
    }
    .tower-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .tw-glyph {
      font-size: 1rem;
      font-weight: bold;
      color: #60a5fa;
      line-height: 1;
    }
    .tower-btn.selected .tw-glyph { color: #facc15; }
    .tw-label { font-size: 0.65rem; color: #94a3b8; white-space: nowrap; }
    .tw-cost  { color: #fbbf24; font-size: 0.62rem; font-weight: bold; }

    /* Tower info */
    #tower-info {
      width: 720px;
      min-height: 84px;
      background: #0b1526;
      border: 1px solid #1e3655;
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .ti-header { display: flex; align-items: center; gap: 10px; }
    .ti-glyph  {
      font-size: 1.2rem;
      font-weight: bold;
      color: #60a5fa;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }
    .ti-name { font-size: 0.95rem; font-weight: bold; color: #f1f5f9; }
    .ti-role {
      font-size: 0.6rem;
      color: #060d1a;
      background: #facc15;
      border-radius: 3px;
      padding: 2px 6px;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .ti-cost { font-size: 0.9rem; color: #fbbf24; font-weight: bold; margin-left: auto; }

    .ti-desc { font-size: 0.78rem; color: #64748b; line-height: 1.45; }

    .ti-stats { display: flex; gap: 28px; }
    .ti-stat  { display: flex; flex-direction: column; gap: 1px; }
    .ti-stat .lab  { font-size: 0.58rem; letter-spacing: 1px; color: #334155; text-transform: uppercase; }
    .ti-stat .bars { color: #3b82f6; letter-spacing: 2px; font-size: 0.85rem; }
    .ti-stat .bars .empty { color: #1e3655; }

    /* Status bar */
    #status-bar {
      display: flex;
      justify-content: space-between;
      width: 720px;
      font-size: 0.7rem;
      color: #334155;
    }
    #my-id-label { font-weight: bold; }

    /* ── Game Over ── */
    #game-over {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-top: 48px;
    }

    .over-header { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #over-title {
      font-size: 3.5rem;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
    #over-stats { font-size: 0.8rem; color: #475569; letter-spacing: 3px; }

    .over-territory-wrap {
      width: 420px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .over-terr-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
    }
    .over-terr-p1-label { color: #60a5fa; }
    .over-terr-p2-label { color: #f87171; }
    .over-territory-bar {
      height: 18px;
      display: flex;
      border-radius: 4px;
      overflow: hidden;
      background: #1e3655;
    }
    #over-terr-p1      { background: #3b82f6; transition: width 0.5s ease; }
    #over-terr-neutral { background: #1e3655; transition: width 0.5s ease; }
    #over-terr-p2      { background: #ef4444; transition: width 0.5s ease; }

    /* ── Buttons ── */
    .btn {
      background: #0b1526;
      border: 1px solid #1e3655;
      border-radius: 6px;
      color: #f1f5f9;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px 28px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
    }
    .btn:hover:not(:disabled) {
      border-color: #3b82f6;
      background: #0d1e38;
      box-shadow: 0 0 14px rgba(59,130,246,0.2);
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.primary { border-color: #2563eb; }
    .btn.primary:hover:not(:disabled) {
      border-color: #60a5fa;
      box-shadow: 0 0 18px rgba(59,130,246,0.35);
    }
  </style>
</head>
<body>

  <div class="site-header">
    <h1>ColorWar</h1>
    <div class="tagline">Territory · Towers · War</div>
  </div>

  <!-- ── Lobby ── -->
  <div id="lobby">
    <div id="loadout">
      <div class="loadout-head">
        <span>選擇出戰砲台</span>
        <span id="loadout-count">0 / 8</span>
      </div>
      <div id="loadout-grid"><!-- filled by JS --></div>
      <div id="loadout-detail"><!-- filled by JS --></div>
      <div class="loadout-hint">選滿 8 種才能開始；對局中只能使用帶上場的砲台</div>
    </div>
    <div class="lobby-actions">
      <div class="lobby-card">
        <div class="lobby-card-title">New Game</div>
        <button id="create-btn" class="btn primary">Create Room</button>
        <div style="font-size:0.65rem;color:#1e3655;letter-spacing:2px">Get a code to share</div>
      </div>
      <div class="lobby-divider">OR</div>
      <div class="lobby-card">
        <div class="lobby-card-title">Join Game</div>
        <input id="code-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0000" autocomplete="off" spellcheck="false" />
        <button id="join-btn" class="btn">Join Room</button>
      </div>
    </div>
    <div class="lobby-solo">
      <div id="difficulty" role="group">
        <button class="diff-btn" data-diff="easy">簡單</button>
        <button class="diff-btn selected" data-diff="normal">普通</button>
        <button class="diff-btn" data-diff="hard">困難</button>
      </div>
      <button id="solo-btn" class="btn primary">🤖 單人對戰電腦</button>
      <div style="font-size:0.65rem;color:#1e3655;letter-spacing:2px;margin-top:5px">立即開打，不需對手</div>
    </div>
    <div id="lobby-error"></div>
    <div id="conn-status"></div>
  </div>

  <!-- ── Waiting ── -->
  <div id="waiting" style="display:none">
    <div class="waiting-label">Room Code</div>
    <div id="room-code-display">----</div>
    <div id="wait-status">Waiting for opponent</div>
    <div class="waiting-hint">Share this code with your opponent</div>
  </div>

  <!-- ── Game ── -->
  <div id="game-container" style="display:none">

    <div id="net-banner" style="display:none"></div>

    <button id="mute-btn" title="靜音／開啟音效" aria-label="mute">🔊</button>

    <div id="hud">
      <div class="player-card p1">
        <div class="pc-name">Player 1 · Blue</div>
        <div class="pc-money" id="p1-money">$100</div>
        <div class="pc-cells" id="p1-cells">0 (0%)</div>
      </div>

      <div class="timer-wrap">
        <div class="timer-label">Time</div>
        <div id="timer">3:00</div>
      </div>

      <div class="player-card p2">
        <div class="pc-name">Player 2 · Red</div>
        <div class="pc-money" id="p2-money">$100</div>
        <div class="pc-cells" id="p2-cells">0 (0%)</div>
      </div>
    </div>

    <div id="territory-bar">
      <div id="terr-p1"      class="terr-seg" style="width:0%"></div>
      <div id="terr-neutral" class="terr-seg" style="width:100%"></div>
      <div id="terr-p2"      class="terr-seg" style="width:0%"></div>
    </div>

    <div id="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="tower-actions" style="display:none">
        <button id="act-upgrade" class="act-btn act-upgrade"></button>
        <button id="act-sell" class="act-btn act-sell"></button>
      </div>
    </div>

    <div id="tower-panel"><!-- filled by JS --></div>

    <div id="tower-info"><!-- filled by JS --></div>

    <div id="status-bar">
      <span id="my-id-label"></span>
      <span id="sell-hint">左鍵放置砲台 &nbsp;|&nbsp; 右鍵賣出砲台</span>
    </div>

  </div>

  <!-- ── Game Over ── -->
  <div id="game-over" style="display:none">
    <div class="over-header">
      <div id="over-title">---</div>
      <div id="over-stats"></div>
    </div>

    <div class="over-territory-wrap">
      <div class="over-terr-row">
        <span class="over-terr-p1-label" id="over-p1-label">P1 —</span>
        <span class="over-terr-p2-label" id="over-p2-label">P2 —</span>
      </div>
      <div class="over-territory-bar">
        <div id="over-terr-p1"      style="width:0%"></div>
        <div id="over-terr-neutral" style="width:100%"></div>
        <div id="over-terr-p2"      style="width:0%"></div>
      </div>
    </div>

    <button id="play-again-btn" class="btn primary">Play Again</button>
  </div>

  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
