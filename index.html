<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorWar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='8' height='16' fill='%233b82f6'/><rect x='8' width='8' height='16' fill='%23ef4444'/></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 10px;
      text-transform: uppercase;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #3b82f6, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Lobby ── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 60px;
    }
    #lobby h2 { font-size: 1.1rem; color: #94a3b8; letter-spacing: 4px; margin-bottom: 8px; }
    .lobby-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 300px;
    }
    .lobby-card input {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 4px;
      color: #f1f5f9;
      font-family: inherit;
      font-size: 1.1rem;
      padding: 8px 12px;
      text-align: center;
      text-transform: uppercase;
      width: 160px;
      letter-spacing: 4px;
    }
    .lobby-card input:focus { outline: 2px solid #3b82f6; }
    #lobby-error { color: #f87171; font-size: 0.85rem; min-height: 1.2em; }
    #conn-status { font-size: 0.78rem; min-height: 1.1em; letter-spacing: 1px; }
    #conn-status.connecting { color: #fbbf24; }
    #conn-status.open { color: #4ade80; }
    #conn-status.closed { color: #f87171; }

    /* ── Waiting ── */
    #waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 80px;
    }
    #waiting h2 { color: #94a3b8; letter-spacing: 4px; }
    #room-code-display {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 16px;
      color: #facc15;
    }
    #wait-status { color: #94a3b8; animation: blink 1.2s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Game ── */
    #game-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    #hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 720px;
      gap: 8px;
    }
    .player-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.85rem;
    }
    .player-info.p1 { color: #93c5fd; }
    .player-info.p2 { color: #fca5a5; text-align: right; }
    .player-info .money { font-size: 1.1rem; font-weight: bold; }
    .player-info .cells { font-size: 0.8rem; opacity: 0.8; }

    #timer {
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      color: #f1f5f9;
      letter-spacing: 2px;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #334155;
      cursor: default;
    }

    #tower-panel {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
    }
    .tower-btn {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 62px;
      transition: border-color 0.1s;
    }
    .tower-btn:hover:not(:disabled) { border-color: #60a5fa; }
    .tower-btn.selected { border-color: #facc15; background: #1c1f0f; }
    .tower-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tw-label { font-weight: bold; font-size: 0.85rem; }
    .tw-cost { color: #fbbf24; font-size: 0.72rem; }

    /* ── Tower info panel ── */
    #tower-info {
      width: 720px;
      min-height: 96px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ti-header { display: flex; align-items: baseline; gap: 10px; }
    .ti-name { font-size: 1.05rem; font-weight: bold; color: #f1f5f9; }
    .ti-role {
      font-size: 0.7rem;
      color: #0f172a;
      background: #facc15;
      border-radius: 3px;
      padding: 1px 6px;
      font-weight: bold;
    }
    .ti-cost { font-size: 0.9rem; color: #fbbf24; margin-left: auto; }
    .ti-desc { font-size: 0.82rem; color: #cbd5e1; line-height: 1.4; }
    .ti-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px 16px;
      font-size: 0.78rem;
    }
    .ti-stat { display: flex; gap: 6px; }
    .ti-stat .lab { color: #94a3b8; width: 42px; }
    .ti-stat .bars { color: #60a5fa; letter-spacing: 1px; }
    .ti-stat .bars .empty { color: #475569; }

    #status-bar {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: #64748b;
    }
    #my-id-label { font-weight: bold; }
    #sell-hint { color: #94a3b8; }

    /* ── Game Over ── */
    #game-over {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 80px;
    }
    #over-title { font-size: 3rem; font-weight: bold; letter-spacing: 4px; }
    #over-stats { color: #94a3b8; font-size: 1rem; }

    /* ── Buttons ── */
    .btn {
      background: #1e293b;
      border: 2px solid #475569;
      border-radius: 6px;
      color: #f1f5f9;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      padding: 10px 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: #60a5fa; background: #1a2a40; }
    .btn.primary { border-color: #3b82f6; }
    .btn.primary:hover { background: #1e3a5f; }
  </style>
</head>
<body>
  <h1>ColorWar</h1>

  <!-- Lobby -->
  <div id="lobby">
    <h2>Choose Mode</h2>
    <div class="lobby-card">
      <button id="create-btn" class="btn primary">Create Room</button>
      <div style="color:#475569;font-size:0.8rem;letter-spacing:2px;">— OR —</div>
      <input id="code-input" type="text" maxlength="4" placeholder="CODE" />
      <button id="join-btn" class="btn">Join Room</button>
      <div id="lobby-error"></div>
      <div id="conn-status"></div>
    </div>
  </div>

  <!-- Waiting for opponent -->
  <div id="waiting" style="display:none">
    <h2>Room Code</h2>
    <div id="room-code-display">----</div>
    <div id="wait-status">Waiting for opponent...</div>
    <div style="color:#475569;font-size:0.8rem;margin-top:8px;">Share this code with your opponent</div>
  </div>

  <!-- Game -->
  <div id="game-container" style="display:none">
    <div id="hud">
      <div class="player-info p1">
        <div class="money" id="p1-money">$0</div>
        <div class="cells" id="p1-cells">0 cells</div>
        <div>Player 1 (Blue)</div>
      </div>
      <div id="timer">3:00</div>
      <div class="player-info p2">
        <div class="money" id="p2-money">$0</div>
        <div class="cells" id="p2-cells">0 cells</div>
        <div>Player 2 (Red)</div>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="tower-panel"><!-- filled by JS --></div>

    <div id="tower-info"><!-- filled by JS --></div>

    <div id="status-bar">
      <span id="my-id-label"></span>
      <span id="sell-hint">Left-click: place tower &nbsp;|&nbsp; Right-click: sell tower</span>
    </div>
  </div>

  <!-- Game Over -->
  <div id="game-over" style="display:none">
    <div id="over-title">---</div>
    <div id="over-stats"></div>
    <button id="play-again-btn" class="btn primary">Play Again</button>
  </div>

  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
